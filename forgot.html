<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans&family=Outfit&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(135deg, #0A1628, #1a1a3e);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.card {
    background: rgba(255,255,255,0.08);
    padding: 30px;
    border-radius: 15px;
    width: 320px;
}
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
}
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg,#4F90D4,#8B7EC9);
    border: none;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
    <h3>Reset Password</h3>

    <input type="email" id="email" placeholder="Enter registered email">
    <button onclick="sendOTP()">Send OTP</button>

    <input type="text" id="otp" placeholder="Enter OTP">
    <button onclick="verifyOTP()">Verify OTP</button>

    <input type="password" id="newPass" placeholder="New Password">
    <input type="password" id="confirmPass" placeholder="Confirm Password">
    <button onclick="resetPassword()">Reset Password</button>
</div>

<script>
async function sendOTP(){
    const email = document.getElementById('email').value;

    const res = await fetch('/send-otp', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email})
    });

    alert((await res.json()).message);
}

async function verifyOTP(){
    const email = document.getElementById('email').value;
    const otp = document.getElementById('otp').value;

    const res = await fetch('/verify-otp',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email, otp})
    });

    alert((await res.json()).message);
}

async function resetPassword(){
    const email = document.getElementById('email').value;
    const password = document.getElementById('newPass').value;
    const confirm = document.getElementById('confirmPass').value;

    if(password !== confirm){
        alert("Passwords do not match");
        return;
    }

    const res = await fetch('/reset-password',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email, password})
    });

    alert((await res.json()).message);
}
</script>

</body>
</html>
